name: Backend Verify

on:
  pull_request:
    branches:
      - main
    # paths:
    #   - "orders-platform/apps/api/**"
    #   - "orders-platform/contracts/**"
    #   - "orders-platform/CLAUDE.md"
    #   - ".github/workflows/backend-verify.yml"
  
  push:
    branches:
      - main
    # paths:
    #   - "orders-platform/apps/api/**"
    #   - "orders-platform/contracts/**"
    #   - "orders-platform/CLAUDE.md"
    #   - ".github/workflows/backend-verify.yml"

permissions:
  contents: read

concurrency:
  group: backend-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Maven verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: orders-platform/apps/api
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: orders-platform/apps/api/pom.xml
      
      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw
      
      - name: Verify backend harness
        run: ./mvnw --batch-mode --no-transfer-progress clean verify
      
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with: 
          name: backend-test-evidence-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            orders-platform/apps/api/target/surefire-reports/**
            orders-platform/apps/api/target/failsafe-reports/**
            orders-platform/apps/api/target/quarkus.log