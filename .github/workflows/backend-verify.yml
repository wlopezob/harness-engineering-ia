name: Backend Verify

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Maven verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: orders-platform/apps/api/pom.xml

      - name: Verify engineering harness
        run: ./harness verify

      - name: Upload harness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-harness-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 14
          path: artifacts/harness/**